<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>www.spinergy.com</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js"></script>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous" />
    </head>
    <body>
         <div id="header"></div>
        <section class="py-5">
            <div class="position-relative py-5">
                <div class="position-absolute">
                    <img
                        alt=""
                        class="img-fluid"
                        src="https://i.pinimg.com/736x/ef/ad/68/efad68826cdf13052e548853a05af09d.jpg" />
                </div>
                <div class="position-relative">
                    <div class="container">
                        <div class="row justify-content-end">
                            <div class="col-lg-6">
                                <div class="bg-white p-5 rounded shadow mt-5">
                                    <h2 class="display-6 fw-bold text-center mb-4">Contact Us</h2>
                                    <form>
                                        <div class="row">
                                            <div class="col-md-12">
                                                <div class="mb-3">
                                                    <input
                                                        class="form-control bg-light"
                                                        placeholder="Your name"
                                                        type="text" />
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <div class="mb-3">
                                                    <input
                                                        class="form-control bg-light"
                                                        placeholder="Your email"
                                                        type="text" />
                                                </div>
                                            </div>
                                            <div class="col-md-12">
                                                <div class="mb-3">
                                                    <textarea
                                                        class="form-control bg-light"
                                                        placeholder="Your message"
                                                        rows="4"></textarea>
                                                </div>
                                            </div>
                                            <div class="col-12 d-flex justify-content-center">
                                                <button class="btn btn-dark px-4" type="submit">Submit</button>
                                            </div>
                                        </div>
                                    </form>
                                    <div class="text-center m-3">
                                        <p class="fs-6 fw-semibold m-2">Contact us directly at:</p>
                                        <p class="fs-6 fst-normal m-2">+52 612 434 6629</p>
                                        <p class="fs-6 fst-italic">spinergy.studio@gmail.com</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
         <div id="footer"></div>
    </body>
</html>
